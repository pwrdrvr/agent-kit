name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: License policy
        run: pnpm lint:licenses

      # Singleton-dependency guard: zod (and any other identity-sensitive lib we
      # add) must resolve to exactly one version. The zed ACP lib pins zod ^3
      # while first-party packages use zod ^4; the root pnpm.overrides collapses
      # that to one copy, and this fails CI if a second copy ever creeps back in.
      - name: Single-version deps
        run: pnpm lint:deps

      # Enforce the layered package graph: no cycles, agent-core + agent-chat-react
      # stay browser-safe (no node: builtins), and each package only reaches its
      # allowed siblings. Runs on source, no build needed.
      - name: Dependency boundaries
        run: pnpm lint:boundaries

      # Build first: packages typecheck against each other's emitted .d.ts
      # (e.g. agent-transport imports @pwrdrvr/agent-core), so dist/ must exist
      # before typecheck. pnpm -r build runs in topological (deps-first) order.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
