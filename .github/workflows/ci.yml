name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile --ignore-pnpmfile

      - name: License policy
        run: pnpm lint:licenses

      # Build first: packages typecheck against each other's emitted .d.ts
      # (e.g. agent-transport imports @pwrdrvr/agent-core), so dist/ must exist
      # before typecheck. pnpm -r build runs in topological (deps-first) order.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
